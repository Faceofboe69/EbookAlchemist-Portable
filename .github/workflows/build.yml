name: Build portable executable

# Builds a fully self-contained Windows package. The build installs and
# bundles calibre's "ebook-convert" engine so the end user needs to download
# nothing else. The result is published as a build artifact (and attached to a
# release when the workflow is triggered by a version tag).

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Install calibre (provides the ebook-convert engine)
        shell: pwsh
        run: |
          # Install calibre via Chocolatey, which is preinstalled on the
          # GitHub Windows runners and reliably handles the download + install.
          # This gives us the full, strongest conversion engine including
          # ebook-convert.exe and all of its supporting binaries.
          $ErrorActionPreference = "Stop"
          choco install calibre --no-progress --yes

      - name: Locate and stage the bundled calibre engine
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $candidates = @(
            "C:\Program Files\Calibre2",
            "C:\Program Files (x86)\Calibre2"
          )
          $src = $null
          foreach ($c in $candidates) {
            if (Test-Path (Join-Path $c "ebook-convert.exe")) { $src = $c; break }
          }
          if (-not $src) {
            # Fall back to a filesystem search under Program Files.
            $hit = Get-ChildItem -Path "C:\Program Files","C:\Program Files (x86)" -Filter "ebook-convert.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($hit) { $src = $hit.Directory.FullName }
          }
          if (-not $src) { throw "ebook-convert.exe could not be located after install" }
          Write-Host "Copying calibre engine from $src"
          New-Item -ItemType Directory -Force -Path "engine\calibre" | Out-Null
          Copy-Item -Path "$src\*" -Destination "engine\calibre" -Recurse -Force
          # Sanity check.
          if (-not (Test-Path "engine\calibre\ebook-convert.exe")) {
            throw "Staging failed: ebook-convert.exe missing in engine\calibre"
          }

      - name: Build the executable with PyInstaller
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # onedir build: the app plus the bundled calibre engine ship together
          # in one folder that the user runs directly. Nothing else to download.
          pyinstaller --noconfirm --clean --windowed `
            --name EbookAlchemist `
            --add-data "engine\calibre;calibre" `
            ebook_alchemist.py

      - name: Package the portable ZIP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $out = "dist\EbookAlchemist"
          if (-not (Test-Path $out)) { throw "PyInstaller output not found" }
          Copy-Item README.md -Destination $out -Force -ErrorAction SilentlyContinue
          Copy-Item SECURITY.md -Destination $out -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "$out\*" -DestinationPath "EbookAlchemist-Portable-win64.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EbookAlchemist-Portable-win64
          path: EbookAlchemist-Portable-win64.zip
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: EbookAlchemist-Portable-win64.zip
